<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #060e10;
      color: #e8fffe;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      width: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: 2px; margin-bottom: 6px; }
    h1 span { color: #06b6d4; }
    .sub { font-size: 11px; color: rgba(165,243,252,0.4); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
    .who { display: inline-block; padding: 6px 18px; background: rgba(13,148,136,0.2); border: 1px solid rgba(13,148,136,0.4); border-radius: 100px; font-size: 12px; font-weight: 700; color: #67e8f9; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 460px; width: 100%; }
    .card { padding: 26px 16px; background: #0d1c1f; border: 1px solid rgba(6,182,212,0.2); border-radius: 18px; cursor: pointer; transition: all 0.18s; }
    .card:hover { background: #0a2228; border-color: rgba(6,182,212,0.5); transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.5); }
    .card-icon { font-size: 34px; margin-bottom: 10px; }
    .card-name { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .card-desc { font-size: 11px; color: rgba(165,243,252,0.45); line-height: 1.6; }
    .foot { margin-top: 26px; display: flex; align-items: center; gap: 14px; }
    .out { padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.12); background: none; color: rgba(165,243,252,0.45); cursor: pointer; font-size: 12px; font-weight: 700; }
    .out:hover { border-color: rgba(239,68,68,0.5); color: #fca5a5; }
    .clock { font-size: 11px; color: rgba(165,243,252,0.25); letter-spacing: 1px; }
    @media(max-width:460px){ .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <h1>BOLT <span>KIOSK</span></h1>
  <div class="sub">Youth Check-In System</div>
  <div class="who" id="who">Welcome!</div>

  <div class="grid">
    <div class="card" onclick="go('kiosk')">
      <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><path d="M13 2L4.5 13.5H12L11 22l8.5-11.5H13Z"/></svg></div>
      <div class="card-name">Check-In Kiosk</div>
      <div class="card-desc">Search students, check in leaders, run today's session</div>
    </div>
    <div class="card" onclick="go('dashboard')">
      <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="card-name">Dashboard</div>
      <div class="card-desc">Live feed, analytics, reports, student management</div>
    </div>
  </div>

  <div class="foot">
    <button class="out" onclick="out()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign Out</button>
    <span class="clock" id="clock"></span>
  </div>

<script>
var tok = '', usr = {};

// Get token + user from URL
(function() {
  try {
    var s = window.location.search;
    // Also try parent frame
    try { if (!s || s.length < 10) s = window.parent.location.search; } catch(e){}
    try { if (!s || s.length < 10) s = window.top.location.search; } catch(e){}
    var p = new URLSearchParams(s);
    tok = p.get('token') || '';
    var u = p.get('user') || '';
    if (u) {
      try { usr = JSON.parse(decodeURIComponent(u)); } catch(e){}
    }
    var name = (usr.name || usr.username || '').split(' ')[0];
    if (name) document.getElementById('who').textContent = 'Hi, ' + name + '!';
  } catch(e) {}
})();

// Clock
function tick() {
  var d=new Date(),h=d.getHours()%12||12,m=('0'+d.getMinutes()).slice(-2),a=d.getHours()<12?'AM':'PM';
  document.getElementById('clock').textContent = h+':'+m+' '+a;
}
tick(); setInterval(tick,1000);

// Navigate — pass token forward
function go(page) {
  var url = '?page='+page;
  if (tok) url += '&token=' + encodeURIComponent(tok);
  if (usr && Object.keys(usr).length) url += '&user=' + encodeURIComponent(JSON.stringify(usr));
  try { window.top.location.href = url; } catch(e) {
    try { window.parent.location.href = url; } catch(e2) {
      window.location.href = url;
    }
  }
}

// Sign out
function out() {
  var url = '?page=auth';
  try { window.top.location.href = url; } catch(e) {
    try { window.parent.location.href = url; } catch(e2) {
      window.location.href = url;
    }
  }
}
</script>
</body>
</html>
