<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bolt Kiosk — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script>
/* ── SESSION BRIDGE ── */
var SESSION = { token:'', orgId:'' };
(function(){
  function tryLoad(){
    try {
      var ss = window.sessionStorage;
      if(ss && ss.getItem('bk_token')){ SESSION.token=ss.getItem('bk_token')||''; SESSION.orgId=ss.getItem('bk_orgId')||''; }
    }catch(e){}
    try { var p=window.parent&&window.parent.SESSION; if(p&&p.token){ SESSION.token=p.token; SESSION.orgId=p.orgId||''; } }catch(e){}
  }
  tryLoad();
  setInterval(function(){
    try { var p=window.SESSION||(window.parent&&window.parent.SESSION); if(p&&p.token&&p.token!==SESSION.token){ SESSION.token=p.token; SESSION.orgId=p.orgId||''; } }catch(e){}
  }, 800);
  window.addEventListener('message', function(e){ if(e.data&&e.data.type==='SESSION_SYNC'&&e.data.session) SESSION=Object.assign(SESSION,e.data.session); });
})();

function getBKToken(){
  try{ var p=window.SESSION||(window.parent&&window.parent.SESSION); if(p&&p.token) return p.token; }catch(e){}
  return SESSION.token||'';
}

function withToken(fn, tries){
  tries=tries||0;
  var t=getBKToken();
  if(t){ fn(t); return; }
  if(tries<12) setTimeout(function(){ withToken(fn,tries+1); }, 500);
  else showErr('No session found. Please sign in again.');
}
</script>

<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
:root{
  --bg:#080e14; --s1:#0d1a24; --s2:#112030;
  --rim:rgba(255,255,255,0.07); --rim2:rgba(255,255,255,0.13);
  --text:#e8f4f8; --muted:#5a8a9a;
  --cyan:#03d5e1; --cyan-d:rgba(3,213,225,0.12); --cyan-b:rgba(3,213,225,0.25);
  --green:#0fa86a; --amber:#f59e0b; --red:#ef4444; --purple:#8b5cf6;
  --font:'Inter',-apple-system,sans-serif; --r:16px;
}
html,body{ height:100%; font-family:var(--font); background:var(--bg); color:var(--text); overflow:hidden; }

/* Layout */
.layout{ display:grid; grid-template-rows:54px 1fr; height:100vh; }
.topbar{ display:flex; align-items:center; gap:10px; padding:0 20px; background:rgba(8,14,20,0.96); border-bottom:1px solid var(--rim); }
.tb-logo{ width:28px; height:28px; border-radius:8px; background:rgba(6,20,22,0.9)!important; border:1px solid var(--cyan-b)!important; box-shadow:0 0 14px rgba(3,213,225,0.35)!important; overflow:hidden; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tb-logo img{ width:100%; height:100%; object-fit:cover; }
.tb-brand{ font-size:14px; font-weight:800; color:#fff; letter-spacing:0.5px; }
.tb-brand span{ color:var(--cyan); }
.live-dot{ display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; color:var(--green); background:rgba(15,168,106,0.1); border:1px solid rgba(15,168,106,0.25); padding:3px 10px; border-radius:100px; letter-spacing:0.5px; }
.live-dot::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.4s ease infinite; }
@keyframes pulse{ 0%,100%{opacity:1}50%{opacity:0.4} }
.sp{ flex:1; }
.btn{ display:flex; align-items:center; gap:5px; padding:6px 12px; border-radius:10px; font-size:12px; font-weight:600; font-family:var(--font); cursor:pointer; border:1px solid var(--rim2); background:var(--s1); color:var(--muted); transition:all .18s; white-space:nowrap; }
.btn:hover{ background:var(--s2); color:var(--text); border-color:var(--cyan-b); }
.btn.accent{ background:var(--cyan-d); border-color:var(--cyan-b); color:var(--cyan); }
.btn.red{ background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.2); color:#ef4444; }

/* Body */
.body{ display:flex; overflow:hidden; }

/* Sidebar */
.sidebar{ width:220px; flex-shrink:0; background:var(--s1); border-right:1px solid var(--rim); display:flex; flex-direction:column; }
.sidebar-scroll{ flex:1; overflow-y:auto; padding:14px 10px; }
.nav-btn{ display:flex; align-items:center; gap:10px; width:100%; padding:9px 12px; border-radius:10px; font-family:var(--font); font-size:13px; font-weight:600; color:var(--muted); background:none; border:none; cursor:pointer; text-align:left; margin-bottom:3px; transition:all .18s; }
.nav-btn:hover{ background:var(--s2); color:var(--text); }
.nav-btn.active{ background:var(--cyan-d); border:1px solid var(--cyan-b); color:var(--cyan); }
.nav-btn svg{ flex-shrink:0; }
.nav-section{ font-size:9px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:2px; padding:10px 12px 6px; }
.sidebar-footer{ padding:10px; border-top:1px solid var(--rim); }

/* Main */
.main{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
.main-head{ padding:16px 20px 12px; border-bottom:1px solid var(--rim); display:flex; align-items:center; gap:12px; flex-shrink:0; }
.main-icon{ font-size:24px; }
.main-title{ font-size:18px; font-weight:800; color:var(--text); }
.main-sub{ font-size:12px; color:var(--muted); margin-top:2px; }
.main-right{ margin-left:auto; display:flex; gap:8px; }
.scroll{ flex:1; overflow-y:auto; padding:20px; scrollbar-width:thin; scrollbar-color:var(--rim) transparent; }

/* Stat cards */
.stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:20px; }
.stat{ background:var(--s1); border:1px solid var(--rim); border-radius:var(--r); padding:16px; position:relative; overflow:hidden; }
.stat::before{ content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.stat.c::before{ background:linear-gradient(90deg,var(--cyan),transparent); }
.stat.g::before{ background:linear-gradient(90deg,var(--green),transparent); }
.stat.a::before{ background:linear-gradient(90deg,var(--amber),transparent); }
.stat.p::before{ background:linear-gradient(90deg,var(--purple),transparent); }
.stat.r::before{ background:linear-gradient(90deg,var(--red),transparent); }
.stat-lbl{ font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:8px; }
.stat-val{ font-size:34px; font-weight:900; color:var(--text); line-height:1; }
.stat-sub{ font-size:11px; color:var(--muted); margin-top:4px; }

/* Section */
.section{ margin-bottom:20px; }
.sec-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.sec-title{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
.badge{ background:var(--s2); border:1px solid var(--rim); border-radius:100px; padding:2px 8px; font-size:10px; font-weight:700; color:var(--muted); }

/* Feed */
.feed{ display:flex; flex-direction:column; gap:6px; }
.feed-item{ display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--s1); border:1px solid var(--rim); border-radius:10px; transition:border-color .18s; animation:fadeIn .25s ease both; }
.feed-item:hover{ border-color:var(--rim2); }
@keyframes fadeIn{ from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.av{ width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#fff; flex-shrink:0; }
.fi-info{ flex:1; min-width:0; }
.fi-name{ font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fi-meta{ font-size:11px; color:var(--muted); margin-top:1px; }
.fi-time{ font-size:10px; color:var(--muted); flex-shrink:0; }
.tag{ font-size:9px; font-weight:800; padding:3px 8px; border-radius:100px; text-transform:uppercase; letter-spacing:0.5px; flex-shrink:0; }
.tag.new{ background:rgba(245,158,11,0.15); color:var(--amber); border:1px solid rgba(245,158,11,0.25); }
.tag.leader{ background:rgba(139,92,246,0.15); color:var(--purple); border:1px solid rgba(139,92,246,0.25); }
.empty{ text-align:center; padding:32px 20px; color:var(--muted); font-size:13px; display:flex; flex-direction:column; align-items:center; gap:10px; }

/* Birthday cards */
.bdays{ display:flex; flex-direction:column; gap:8px; }
.bday{ display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--s1); border:1px solid var(--rim); border-radius:10px; }
.bday.today{ border-color:rgba(245,158,11,0.4); background:rgba(245,158,11,0.04); }
.bday-info{ flex:1; }
.bday-name{ font-size:13px; font-weight:700; color:var(--text); }
.bday-detail{ font-size:11px; color:var(--muted); margin-top:2px; }
.bday-when{ font-size:11px; font-weight:700; padding:4px 10px; border-radius:100px; flex-shrink:0; }
.bday-when.today{ background:rgba(245,158,11,0.2); color:var(--amber); }
.bday-when.soon{ background:rgba(3,213,225,0.1); color:var(--cyan); }
.send-btn{ display:flex; align-items:center; gap:4px; padding:5px 12px; border-radius:8px; font-size:11px; font-weight:700; font-family:var(--font); cursor:pointer; border:1px solid var(--cyan-b); background:var(--cyan-d); color:var(--cyan); transition:all .18s; flex-shrink:0; }
.send-btn:hover{ background:rgba(3,213,225,0.2); transform:scale(1.02); }
.send-btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }
.send-btn.sent{ border-color:rgba(15,168,106,0.4); background:rgba(15,168,106,0.1); color:var(--green); }

/* Toast */
.toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--s2); border:1px solid var(--rim2); border-radius:100px; padding:10px 20px; font-size:13px; font-weight:600; color:var(--text); opacity:0; transition:all .3s; z-index:9999; white-space:nowrap; pointer-events:none; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok{ border-color:rgba(15,168,106,0.4); color:var(--green); }
.toast.err{ border-color:rgba(239,68,68,0.4); color:#ef4444; }

/* Error banner */
.err-banner{ background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); border-radius:10px; padding:10px 14px; color:#f87171; font-size:13px; margin-bottom:16px; display:none; }

/* Loading skeleton */
.skel{ background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%); background-size:200% 100%; animation:shimmer 1.4s ease infinite; border-radius:10px; }
@keyframes shimmer{ to{background-position:-200% 0} }

/* Mobile */
@media(max-width:700px){
  .sidebar{ display:none; }
  .stats{ grid-template-columns:1fr 1fr; }
  .stat-val{ font-size:28px; }
  .scroll{ padding:14px; }
  .main-head{ padding:12px 14px 10px; }
  .main-title{ font-size:16px; }
}
</style>
</head>

<body>
<div class="layout">

  <!-- Top bar -->
  <header class="topbar">
    <div class="tb-logo"><img src="icon-192.png" alt="B" onerror="this.style.display='none'"></div>
    <span class="tb-brand">BOLT <span>KIOSK</span></span>
    <div class="live-dot">LIVE</div>
    <div class="sp"></div>
    <button class="btn accent" onclick="loadData()" id="refreshBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
    <button class="btn" onclick="goHome()">← Home</button>
    <button class="btn red" onclick="signOut()">Sign Out</button>
  </header>

  <div class="body">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-scroll">
        <div class="nav-section">Views</div>
        <button class="nav-btn active" id="nav-overview" onclick="switchView('overview',this)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Overview
        </button>
        <button class="nav-btn" id="nav-checkins" onclick="switchView('checkins',this)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Today's Check-ins
        </button>
        <button class="nav-btn" id="nav-birthdays" onclick="switchView('birthdays',this)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Birthdays
        </button>
      </div>
      <div class="sidebar-footer">
        <button class="nav-btn" onclick="goHome()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </button>
        <button class="nav-btn" style="color:#ef4444" onclick="signOut()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main">
      <div class="main-head">
        <div class="main-icon" id="viewIcon">📊</div>
        <div>
          <div class="main-title" id="viewTitle">Overview</div>
          <div class="main-sub" id="viewSub">Loading data…</div>
        </div>
        <div class="main-right">
          <span id="lastUpdate" style="font-size:11px;color:var(--muted)"></span>
        </div>
      </div>

      <div class="scroll" id="mainScroll">
        <div class="err-banner" id="errBanner"></div>

        <!-- OVERVIEW view -->
        <div id="view-overview">
          <div class="stats" id="statsGrid"></div>
          <div class="section">
            <div class="sec-head">
              <span class="sec-title">Today's Live Feed</span>
              <span class="badge" id="feedCount">0</span>
            </div>
            <div class="feed" id="feedList">
              <div class="skel" style="height:56px"></div>
              <div class="skel" style="height:56px;animation-delay:.1s"></div>
              <div class="skel" style="height:56px;animation-delay:.2s"></div>
            </div>
          </div>
        </div>

        <!-- CHECKINS view -->
        <div id="view-checkins" style="display:none">
          <div class="section">
            <div class="sec-head">
              <span class="sec-title">All Check-ins Today</span>
              <span class="badge" id="ciCount">0</span>
            </div>
            <div class="feed" id="ciList"></div>
          </div>
        </div>

        <!-- BIRTHDAYS view -->
        <div id="view-birthdays" style="display:none">
          <div class="section">
            <div class="sec-head">
              <span class="sec-title">🎂 Upcoming Birthdays — Next 30 Days</span>
              <span class="badge" id="bdayCount">0</span>
            </div>
            <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Send a birthday message directly to their email or phone number on file.</p>
            <div class="bdays" id="bdayList"></div>
          </div>
        </div>

      </div>
    </main>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════
   BOLT KIOSK DASHBOARD — Simple & Fast
   3 views: Overview · Check-ins · Birthdays
   Data from: getDashboardData + getAllStudentsAPI
════════════════════════════════════════════════ */

var _state = { dash: null, students: [], view: 'overview' };
var _sent = {}; // track sent birthday messages

/* ── Switch view ── */
function switchView(key, btn) {
  _state.view = key;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  if(btn) btn.classList.add('active');
  ['overview','checkins','birthdays'].forEach(function(v){
    document.getElementById('view-'+v).style.display = v===key ? 'block' : 'none';
  });
  var cfg = {
    overview:  { icon:'📊', title:'Overview',            sub:'Today\'s attendance at a glance' },
    checkins:  { icon:'✅', title:'Today\'s Check-ins',  sub:'Everyone who checked in today'   },
    birthdays: { icon:'🎂', title:'Birthdays',            sub:'Next 30 days — tap to send message' },
  };
  var c = cfg[key] || cfg.overview;
  document.getElementById('viewIcon').textContent  = c.icon;
  document.getElementById('viewTitle').textContent = c.title;
  document.getElementById('viewSub').textContent   = c.sub;
  render();
}

/* ── Load data from backend ── */
function loadData() {
  var btn = document.getElementById('refreshBtn');
  if(btn){ btn.disabled=true; btn.textContent='Loading…'; }

  withToken(function(tok) {
    var done = 0;
    function check(){ done++; if(done>=2){ renderAll(); if(btn){btn.disabled=false;btn.textContent='Refresh';} var now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); document.getElementById('lastUpdate').textContent='Updated '+now; document.getElementById('viewSub').textContent=(cfg()[_state.view]||{}).sub||''; } }
    function cfg(){ return {overview:{sub:'Today\'s attendance at a glance'},checkins:{sub:'Everyone who checked in today'},birthdays:{sub:'Next 30 days — tap to send message'}}; }

    // 1. Dashboard data (check-ins, counts)
    google.script.run
      .withSuccessHandler(function(d){
        _state.dash = d || {};
        check();
      })
      .withFailureHandler(function(e){
        showErr('Could not load check-in data. Check your connection.');
        _state.dash = {};
        check();
      })
      .gasCall(tok, 'getDashboardData');

    // 2. All students (for birthday lookups)
    google.script.run
      .withSuccessHandler(function(d){
        _state.students = Array.isArray(d) ? d : (d||[]);
        check();
      })
      .withFailureHandler(function(e){
        _state.students = [];
        check();
      })
      .gasCall(tok, 'getAllStudentsAPI');
  });
}

/* ── Render all views ── */
function renderAll() {
  renderStats();
  renderFeed();
  renderCheckins();
  renderBirthdays();
}
function render() {
  renderStats();
  renderFeed();
  renderCheckins();
  renderBirthdays();
}

/* ── Stat cards ── */
function renderStats() {
  var d = _state.dash || {};
  var checkins = d.checkins || [];
  var members  = checkins.filter(function(c){ return c.role!=='leader'&&c.type!=='leader'; });
  var leaders  = checkins.filter(function(c){ return c.role==='leader'||c.type==='leader'; });
  var newToday = members.filter(function(c){ return c.firstTime||c.isNew||c.neverSeenBefore; });
  var total    = _state.students.length;
  var bdays    = getBirthdaysIn(30).length;

  var cards = [
    { label:'Checked In Today', val:members.length,  sub:'Members present',    col:'c' },
    { label:'Total Registered', val:total,            sub:'In the database',    col:'g' },
    { label:'Leaders Today',    val:leaders.length,   sub:'On duty',            col:'p' },
    { label:'First Timers',     val:newToday.length,  sub:'New today',          col:'a' },
    { label:'Upcoming Birthdays',val:bdays,           sub:'Next 30 days',       col:'r' },
  ];

  document.getElementById('statsGrid').innerHTML = cards.map(function(c, i){
    return '<div class="stat '+c.col+'" style="animation:fadeIn .3s ease '+(i*0.06)+'s both">'+
      '<div class="stat-lbl">'+c.label+'</div>'+
      '<div class="stat-val">'+c.val+'</div>'+
      '<div class="stat-sub">'+c.sub+'</div>'+
      '</div>';
  }).join('');
}

/* ── Live feed (overview) ── */
function renderFeed() {
  var checkins = (_state.dash||{}).checkins || [];
  var el = document.getElementById('feedList');
  var countEl = document.getElementById('feedCount');
  if(countEl) countEl.textContent = checkins.length;

  if(!checkins.length){
    el.innerHTML = '<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>No check-ins yet today</span></div>';
    return;
  }

  var colors = ['#0ea5e9','#8b5cf6','#f59e0b','#ec4899','#0fa86a','#f97316','#14b8a6'];
  el.innerHTML = checkins.slice().reverse().slice(0,50).map(function(c, i){
    var name = c.fullName||c.name||((c.firstName||'')+' '+(c.lastName||'')).trim()||'Unknown';
    var initials = name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var col = colors[Math.abs(hashStr(name))%colors.length];
    var t = '';
    try{ var d=new Date(c.timestamp||c.time||c.checkinTime||''); if(!isNaN(d)) t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }catch(e){}
    var isNew = c.firstTime||c.isNew||c.neverSeenBefore;
    var isLeader = c.role==='leader'||c.type==='leader';
    return '<div class="feed-item" style="animation-delay:'+(i*0.03)+'s">'+
      '<div class="av" style="background:'+col+'">'+initials+'</div>'+
      '<div class="fi-info"><div class="fi-name">'+esc(name)+'</div><div class="fi-meta">'+(c.event||c.eventName||'')+(c.department?' · '+c.department:'')+'</div></div>'+
      (isNew?'<span class="tag new">New</span>':isLeader?'<span class="tag leader">Leader</span>':'')+
      (t?'<span class="fi-time">'+t+'</span>':'')+
      '</div>';
  }).join('');
}

/* ── Full check-ins list ── */
function renderCheckins() {
  var checkins = (_state.dash||{}).checkins || [];
  var el = document.getElementById('ciList');
  var countEl = document.getElementById('ciCount');
  if(!el) return;
  if(countEl) countEl.textContent = checkins.length;

  if(!checkins.length){
    el.innerHTML = '<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>No check-ins yet today</span></div>';
    return;
  }
  // Reuse feed render
  var tmp = document.createElement('div');
  tmp.innerHTML = document.getElementById('feedList').innerHTML;
  el.innerHTML = tmp.innerHTML;
}

/* ── Birthday helpers ── */
function getBirthdaysIn(days) {
  var today = new Date();
  today.setHours(0,0,0,0);
  var out = [];
  _state.students.forEach(function(s){
    var bday = s.birthday || s.dob || '';
    if(!bday) return;
    try {
      var d = new Date(bday);
      if(isNaN(d)) return;
      var thisYear = new Date(today.getFullYear(), d.getMonth(), d.getDate());
      var diff = Math.floor((thisYear - today) / 86400000);
      if(diff < 0) thisYear = new Date(today.getFullYear()+1, d.getMonth(), d.getDate());
      diff = Math.floor((thisYear - today) / 86400000);
      if(diff <= days) {
        var age = today.getFullYear() - d.getFullYear();
        out.push({ student:s, daysUntil:diff, age:age, date:thisYear });
      }
    } catch(e){}
  });
  return out.sort(function(a,b){ return a.daysUntil-b.daysUntil; });
}

/* ── Render birthdays ── */
function renderBirthdays() {
  var bdays = getBirthdaysIn(30);
  var el = document.getElementById('bdayList');
  var countEl = document.getElementById('bdayCount');
  if(!el) return;
  if(countEl) countEl.textContent = bdays.length;

  if(!bdays.length){
    el.innerHTML = '<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>No birthdays in the next 30 days</span></div>';
    return;
  }

  el.innerHTML = bdays.map(function(b){
    var s = b.student;
    var name = ((s.firstName||'')+' '+(s.lastName||'')).trim() || s.name || 'Unknown';
    var key = s.id || name;
    var isToday = b.daysUntil === 0;
    var whenText = isToday ? '🎉 Today!' : b.daysUntil===1 ? 'Tomorrow' : 'In '+b.daysUntil+' days';
    var colors = ['#0ea5e9','#8b5cf6','#f59e0b','#ec4899','#0fa86a'];
    var col = colors[Math.abs(hashStr(name))%colors.length];
    var initials = name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var hasContact = s.email || s.phone;
    var sentAlready = _sent[key];
    return '<div class="bday'+(isToday?' today':'')+'">'+
      '<div class="av" style="background:'+col+';width:40px;height:40px;border-radius:10px;font-size:13px">'+initials+'</div>'+
      '<div class="bday-info">'+
        '<div class="bday-name">'+esc(name)+'</div>'+
        '<div class="bday-detail">'+
          (b.age ? 'Turning '+b.age+' · ' : '')+
          (s.email ? '📧 '+esc(s.email) : s.phone ? '📱 '+esc(s.phone) : '<span style="color:var(--muted);font-style:italic">No contact info</span>')+
        '</div>'+
      '</div>'+
      '<div class="bday-when '+(isToday?'today':'soon')+'">'+whenText+'</div>'+
      (hasContact
        ? '<button class="send-btn'+(sentAlready?' sent':'')+'" id="bday-btn-'+encodeURIComponent(key)+'" onclick="sendBday(\''+encodeURIComponent(key)+'\',\''+encodeURIComponent(name)+'\',\''+encodeURIComponent(s.email||'')+'\',\''+encodeURIComponent(s.phone||'')+'\','+b.daysUntil+')" '+(sentAlready?'disabled':'')+'>'+
            (sentAlready ? '✓ Sent' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Wishes')+
          '</button>'
        : '<span style="font-size:10px;color:var(--muted);padding:0 8px">No contact</span>')+
      '</div>';
  }).join('');
}

/* ── Send birthday message ── */
function sendBday(keyEnc, nameEnc, emailEnc, phoneEnc, daysUntil) {
  var key   = decodeURIComponent(keyEnc);
  var name  = decodeURIComponent(nameEnc);
  var email = decodeURIComponent(emailEnc);
  var phone = decodeURIComponent(phoneEnc);

  var btn = document.getElementById('bday-btn-'+keyEnc);
  if(btn){ btn.disabled=true; btn.textContent='Sending…'; }

  var isToday = daysUntil === 0;
  var firstName = name.split(' ')[0];

  var subject = isToday
    ? 'Happy Birthday, ' + firstName + '! 🎉'
    : 'Your birthday is coming up, ' + firstName + '! 🎂';

  var message = isToday
    ? 'Happy Birthday, ' + firstName + '!\n\nWishing you a wonderful day filled with joy and blessings. We are so glad you are part of our community!\n\nWith love,\nThe Ministry Team'
    : 'Hi ' + firstName + ',\n\nYour birthday is just around the corner! We wanted to wish you an early Happy Birthday and let you know you are appreciated.\n\nWith love,\nThe Ministry Team';

  withToken(function(tok) {
    google.script.run
      .withSuccessHandler(function(r){
        if(r && r.success){
          _sent[key] = true;
          if(btn){ btn.className='send-btn sent'; btn.disabled=true; btn.textContent='✓ Sent'; }
          showToast('Birthday message sent to '+firstName+'!','ok');
        } else {
          if(btn){ btn.disabled=false; btn.textContent='Send Wishes'; }
          showToast('Could not send: '+(r&&r.error?r.error:'Unknown error'),'err');
        }
      })
      .withFailureHandler(function(e){
        if(btn){ btn.disabled=false; btn.textContent='Send Wishes'; }
        showToast('Send failed: '+String(e),'err');
      })
      .gasCall(tok, 'sendBirthdayMessageAPI', email, phone, subject, message, name);
  });
}

/* ── Utilities ── */
function esc(s){ var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
function hashStr(s){ var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h; }

var _toastTimer;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.className = 'toast show '+(type||'');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
function showErr(msg) {
  var el = document.getElementById('errBanner');
  if(!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function goHome(){
  try{ if(window.parent&&window.parent.showView) window.parent.showView('vHome'); }catch(e){}
  try{ if(typeof showView!=='undefined') showView('vHome'); }catch(e){}
}
function signOut(){
  try{ if(window.parent&&window.parent.AUTH) window.parent.AUTH.logout(); }catch(e){}
  try{ if(typeof AUTH!=='undefined') AUTH.logout(); }catch(e){}
}

/* ── Auto-refresh every 30s ── */
setInterval(function(){ loadData(); }, 30000);

/* ── Init ── */
window.addEventListener('load', function(){
  switchView('overview', document.getElementById('nav-overview'));
  withToken(function(){ loadData(); });
});
