<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bolt Kiosk — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script>
// Token from GAS template (server-side injection)
var _tmplToken = '<?= injectedToken ?>';
var _tmplOrgId = '<?= injectedOrgId ?>';

var SESSION = { token: '', orgId: '' };

(function(){
  // 1. Server-injected token (most reliable)
  if(_tmplToken && _tmplToken.length > 10 && _tmplToken.indexOf('<?') === -1){
    SESSION.token = _tmplToken;
    SESSION.orgId = _tmplOrgId || '';
    return;
  }
  // 2. URL params — parse from window.location.href directly  
  try{
    var href = window.location.href;
    var tokenMatch = href.match(/[?&]token=([^&]+)/);
    var orgMatch   = href.match(/[?&]orgId=([^&]+)/);
    if(tokenMatch){ SESSION.token = decodeURIComponent(tokenMatch[1]); }
    if(orgMatch)  { SESSION.orgId = decodeURIComponent(orgMatch[1]); }
    if(SESSION.token) return;
  }catch(e){}
  // 3. sessionStorage fallback
  try{
    var ss = window.sessionStorage;
    if(ss && ss.getItem('bk_token')){
      SESSION.token = ss.getItem('bk_token')||'';
      SESSION.orgId = ss.getItem('bk_orgId')||'';
    }
  }catch(e){}
})();

function getBKToken(){ return SESSION.token||''; }
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e14;--s1:#0d1a24;--s2:#112030;
  --rim:rgba(255,255,255,0.07);--rim2:rgba(255,255,255,0.13);
  --text:#e8f4f8;--muted:#5a8a9a;
  --cyan:#03d5e1;--cyan-d:rgba(3,213,225,0.12);--cyan-b:rgba(3,213,225,0.25);
  --green:#0fa86a;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --font:'Inter',-apple-system,sans-serif;--r:14px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}

/* Layout */
.layout{display:grid;grid-template-rows:52px 1fr;height:100vh}
.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;background:rgba(8,14,20,0.97);border-bottom:1px solid var(--rim);z-index:10}
.tb-logo{width:28px;height:28px;border-radius:8px;background:rgba(6,20,22,0.9)!important;border:1px solid var(--cyan-b)!important;box-shadow:0 0 14px rgba(3,213,225,0.35)!important;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-logo img{width:100%;height:100%;object-fit:cover}
.tb-brand{font-size:14px;font-weight:800;color:#fff;letter-spacing:0.5px}
.tb-brand b{color:var(--cyan);font-weight:800}
.live{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--green);background:rgba(15,168,106,0.1);border:1px solid rgba(15,168,106,0.25);padding:3px 10px;border-radius:100px;letter-spacing:0.5px}
.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sp{flex:1}
.btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;border:1px solid var(--rim2);background:var(--s1);color:var(--muted);transition:all .18s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--s2);color:var(--text);border-color:var(--cyan-b)}
.btn.accent{background:var(--cyan-d);border-color:var(--cyan-b);color:var(--cyan)}
.btn.danger{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.2);color:#ef4444}

/* Body */
.body{display:grid;grid-template-columns:200px 1fr;overflow:hidden}

/* Sidebar */
.sidebar{background:var(--s1);border-right:1px solid var(--rim);display:flex;flex-direction:column;overflow:hidden}
.sidebar-body{flex:1;overflow-y:auto;padding:12px 8px}
.nav-lbl{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:8px 10px 5px}
.nav{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:10px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;text-align:left;margin-bottom:2px;transition:all .18s}
.nav:hover{background:var(--s2);color:var(--text)}
.nav.on{background:var(--cyan-d);border:1px solid var(--cyan-b);color:var(--cyan)}
.sidebar-foot{padding:8px;border-top:1px solid var(--rim)}

/* Main */
.main{display:flex;flex-direction:column;overflow:hidden}
.main-head{padding:14px 20px 12px;border-bottom:1px solid var(--rim);display:flex;align-items:center;gap:12px;flex-shrink:0}
.main-icon{font-size:22px}
.main-title{font-size:17px;font-weight:800}
.main-sub{font-size:11px;color:var(--muted);margin-top:2px}
.head-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.upd{font-size:11px;color:var(--muted)}
.scroll{flex:1;overflow-y:auto;padding:18px 20px 24px;scrollbar-width:thin;scrollbar-color:var(--rim) transparent}

/* Error */
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.22);border-radius:10px;padding:10px 14px;color:#f87171;font-size:13px;margin-bottom:14px;display:none}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--s1);border:1px solid var(--rim);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.g::before{background:linear-gradient(90deg,var(--green),transparent)}
.a::before{background:linear-gradient(90deg,var(--amber),transparent)}
.p::before{background:linear-gradient(90deg,var(--purple),transparent)}
.r::before{background:linear-gradient(90deg,var(--red),transparent)}
.stat-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.stat-val{font-size:32px;font-weight:900;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* Section */
.sec{margin-bottom:16px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.bdg{background:var(--s2);border:1px solid var(--rim);border-radius:100px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--muted)}

/* Feed items */
.feed{display:flex;flex-direction:column;gap:6px}
.fi{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--s1);border:1px solid var(--rim);border-radius:10px;transition:border-color .18s;animation:fi .22s ease both}
.fi:hover{border-color:var(--rim2)}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.fi-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:11px;color:var(--muted);margin-top:1px}
.fi-time{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:auto}
.tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.tag.new{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.tag.ldr{background:rgba(139,92,246,0.15);color:var(--purple);border:1px solid rgba(139,92,246,0.2)}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px 20px;color:var(--muted);font-size:13px;text-align:center}
.empty svg{opacity:0.3}

/* Birthday */
.bdays{display:flex;flex-direction:column;gap:7px}
.bday{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--s1);border:1px solid var(--rim);border-radius:10px}
.bday.today{border-color:rgba(245,158,11,0.35);background:rgba(245,158,11,0.03)}
.bday-info{flex:1;min-width:0}
.bday-name{font-size:13px;font-weight:700}
.bday-detail{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.when{font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;flex-shrink:0}
.when.today{background:rgba(245,158,11,0.18);color:var(--amber)}
.when.soon{background:var(--cyan-d);color:var(--cyan)}
.send-btn{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;border:1px solid var(--cyan-b);background:var(--cyan-d);color:var(--cyan);transition:all .18s;flex-shrink:0;white-space:nowrap}
.send-btn:hover{background:rgba(3,213,225,0.2)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.send-btn.sent{border-color:rgba(15,168,106,0.35);background:rgba(15,168,106,0.08);color:var(--green)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--rim2);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(15,168,106,0.4);color:var(--green)}
.toast.err{border-color:rgba(239,68,68,0.4);color:#ef4444}

/* Skeleton */
.skel{background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);background-size:200% 100%;animation:sk 1.4s ease infinite;border-radius:10px}
@keyframes sk{to{background-position:-200% 0}}

/* Mobile */
@media(max-width:680px){
  .body{grid-template-columns:1fr}
  .sidebar{display:none}
  .stats{grid-template-columns:1fr 1fr}
  .stat-val{font-size:26px}
  .scroll{padding:12px}
}
</style>
</head>
<body>
<div class="layout">
  <header class="topbar">
    <div class="tb-logo"><img src="https://kevinwallace553-oss.github.io/Bolt/icon-192.png" alt="B" onerror="this.style.display='none'"></div>
    <span class="tb-brand">BOLT <b>KIOSK</b></span>
    <div class="live">LIVE</div>
    <div class="sp"></div>
    <button class="btn accent" onclick="loadData()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh

  <div class="body">
    <nav class="sidebar">
      <div class="sidebar-body">
        <div class="nav-lbl">Views</div>
        <button class="nav on" id="nav-ov" onclick="show('overview',this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

        </button>

        </button>
        <button class="nav" id="nav-bd" onclick="show('birthdays',this)">

    <main class="main">
      <div class="main-head">

          <div class="main-title" id="vt">Overview</div>

</div>
<div class="toast" id="toast"></div>

<script>
var _data = { dash:{}, students:[], view:'overview' };
var _sent = {};
var VIEWS = {
  overview:  {icon:'📊', title:'Overview',           sub:'Today\'s attendance at a glance'},
  checkins:  {icon:'✅', title:'Today\'s Check-ins', sub:'Everyone who checked in today'},
  birthdays: {icon:'🎂', title:'Birthdays',           sub:'Next 30 days — click to send a birthday message'},
};

function show(v, btn) {
  _data.view = v;
  document.querySelectorAll('.nav').forEach(function(b){ b.classList.remove('on'); });
  if(btn) btn.classList.add('on');
  ['overview','checkins','birthdays'].forEach(function(k){
    document.getElementById('v-'+k).style.display = k===v ? 'block' : 'none';
  });
  var cfg = VIEWS[v]||VIEWS.overview;
  document.getElementById('vi').textContent  = cfg.icon;
  document.getElementById('vt').textContent  = cfg.title;
  document.getElementById('vs').textContent  = cfg.sub;
}

function loadData() {
  var tok = getBKToken();
  if(!tok){ showErr('No session — please sign in again.'); return; }
  
  showErr('');
  var done = 0;
  function check(){ if(++done >= 2){ renderAll(); stamp(); } }

  google.script.run
    .withSuccessHandler(function(d){ _data.dash = d||{}; check(); })
    .withFailureHandler(function(e){ showErr('Check-in data error: '+e); _data.dash={}; check(); })
    .gasCall(tok, 'getDashboardData');

  google.script.run
    .withSuccessHandler(function(d){ _data.students = Array.isArray(d)?d:(d||[]); check(); })
    .withFailureHandler(function(e){ _data.students=[]; check(); })
    .gasCall(tok, 'getAllStudentsAPI');
}

function renderAll(){ renderStats(); renderFeed(); renderCI(); renderBdays(); }

function renderStats(){
  var ci = (_data.dash.checkins||[]);
  var members = ci.filter(function(c){ return c.role!=='leader'&&c.type!=='leader'; });
  var leaders = ci.filter(function(c){ return c.role==='leader'||c.type==='leader'; });
  var newToday= members.filter(function(c){ return c.firstTime||c.isNew||c.neverSeenBefore; });
  var cards = [
    {l:'Checked In Today', v:members.length,          s:'Members present',  c:'c'},
    {l:'Total Registered', v:_data.students.length,   s:'In the database',  c:'g'},
    {l:'Leaders Today',    v:leaders.length,           s:'On duty',          c:'p'},
    {l:'First Timers',     v:newToday.length,          s:'New today',        c:'a'},
    {l:'Upcoming Birthdays',v:getBdays(30).length,     s:'Next 30 days',     c:'r'},
  ];
  document.getElementById('statsGrid').innerHTML = cards.map(function(c,i){
    return '<div class="stat '+c.c+'" style="animation:fi .3s ease '+(i*.07)+'s both">'+
      '<div class="stat-lbl">'+c.l+'</div><div class="stat-val">'+c.v+'</div><div class="stat-sub">'+c.s+'</div></div>';
  }).join('');
}

function renderFeed(){
  var ci = (_data.dash.checkins||[]);
  document.getElementById('fc').textContent = ci.length;
  document.getElementById('feedList').innerHTML = ci.length ? buildFeedHTML(ci.slice().reverse().slice(0,40)) :
    '<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>No check-ins yet today</span></div>';
}

function renderCI(){
  var ci = (_data.dash.checkins||[]);
  document.getElementById('cic').textContent = ci.length;
  document.getElementById('ciList').innerHTML = ci.length ? buildFeedHTML(ci.slice().reverse()) :
    '<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg><span>No check-ins yet today</span></div>';
}

function buildFeedHTML(items){
  var cols=['#0ea5e9','#8b5cf6','#f59e0b','#ec4899','#0fa86a','#f97316','#14b8a6'];
  return items.map(function(c,i){
    var name=c.fullName||c.name||((c.firstName||'')+' '+(c.lastName||'')).trim()||'Unknown';
    var init=name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var col=cols[Math.abs(hsh(name))%cols.length];
    var t=''; try{var d=new Date(c.timestamp||c.time||'');if(!isNaN(d))t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){}
    var isNew=c.firstTime||c.isNew||c.neverSeenBefore;
    var isLdr=c.role==='leader'||c.type==='leader';
    return '<div class="fi" style="animation-delay:'+(i*.03)+'s">'+
      '<div class="av" style="background:'+col+'">'+init+'</div>'+
      '<div style="flex:1;min-width:0"><div class="fi-name">'+esc(name)+'</div>'+
      '<div class="fi-meta">'+(c.event||c.eventName||'')+(c.department?' · '+c.department:'')+'</div></div>'+
      (isNew?'<span class="tag new">New</span>':isLdr?'<span class="tag ldr">Leader</span>':'')+
      (t?'<span class="fi-time">'+t+'</span>':'')+
      '</div>';
  }).join('');
}

function getBdays(days){
  var today=new Date(); today.setHours(0,0,0,0);
  return _data.students.reduce(function(acc,s){
    var b=s.birthday||s.dob||''; if(!b) return acc;
    try{
      var d=new Date(b); if(isNaN(d)) return acc;
      var ny=new Date(today.getFullYear(),d.getMonth(),d.getDate());
      var diff=Math.floor((ny-today)/86400000);
      if(diff<0){ny=new Date(today.getFullYear()+1,d.getMonth(),d.getDate());diff=Math.floor((ny-today)/86400000);}
      if(diff<=days) acc.push({s:s,diff:diff,age:today.getFullYear()-d.getFullYear()});
    }catch(e){}
    return acc;
  },[]).sort(function(a,b){return a.diff-b.diff;});
}

function renderBdays(){
  var bdays=getBdays(30);
  document.getElementById('bc').textContent=bdays.length;
  var el=document.getElementById('bdayList');
  if(!bdays.length){
    el.innerHTML='<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>No birthdays in the next 30 days</span></div>';
    return;
  }
  var cols=['#0ea5e9','#8b5cf6','#f59e0b','#ec4899','#0fa86a'];
  el.innerHTML=bdays.map(function(b){
    var s=b.s;
    var name=((s.firstName||'')+' '+(s.lastName||'')).trim()||s.name||'Unknown';
    var key=s.id||name;
    var keyE=encodeURIComponent(key);
    var isToday=b.diff===0;
    var whenTxt=isToday?'🎉 Today!':b.diff===1?'Tomorrow':'In '+b.diff+'d';
    var col=cols[Math.abs(hsh(name))%cols.length];
    var init=name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var hasContact=s.email||s.phone;
    var isSent=_sent[key];
    return '<div class="bday'+(isToday?' today':'')+'">'+
      '<div class="av" style="background:'+col+';width:38px;height:38px;border-radius:9px;font-size:12px">'+init+'</div>'+
      '<div class="bday-info">'+
        '<div class="bday-name">'+esc(name)+'</div>'+
        '<div class="bday-detail">'+(b.age?'Turning '+b.age+' · ':'')+
          (s.email?'📧 '+esc(s.email):s.phone?'📱 '+esc(s.phone):'<i style="color:var(--muted)">No contact info</i>')+
        '</div></div>'+
      '<span class="when '+(isToday?'today':'soon')+'">'+whenTxt+'</span>'+
      (hasContact
        ?'<button class="send-btn'+(isSent?' sent':'')+'" id="bb-'+keyE+'" '+
          'onclick="sendBday(\''+keyE+'\',\''+encodeURIComponent(name)+'\',\''+encodeURIComponent(s.email||'')+'\',\''+encodeURIComponent(s.phone||'')+'\','+b.diff+')" '+
          (isSent?'disabled':'')+'>'+
          (isSent?'✓ Sent':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send')+
          '</button>'
        :'<span style="font-size:10px;color:var(--muted)">No contact</span>')+
      '</div>';
  }).join('');
}

function sendBday(keyE,nameE,emailE,phoneE,diff){
  var key=decodeURIComponent(keyE),name=decodeURIComponent(nameE);
  var email=decodeURIComponent(emailE),phone=decodeURIComponent(phoneE);
  var btn=document.getElementById('bb-'+keyE);
  if(btn){btn.disabled=true;btn.textContent='Sending…';}
  var first=name.split(' ')[0];
  var isToday=diff===0;
  var subj=isToday?'Happy Birthday, '+first+'! 🎉':'Your birthday is coming up, '+first+'! 🎂';
  var msg=isToday
    ?'Happy Birthday, '+first+'!\n\nWishing you a wonderful day filled with joy and blessings. We are so glad you are part of our community!\n\nWith love,\nThe Ministry Team'
    :'Hi '+first+',\n\nYour birthday is just around the corner! We wanted to wish you an early Happy Birthday and let you know you are appreciated.\n\nWith love,\nThe Ministry Team';
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.success){
        _sent[key]=true;
        if(btn){btn.className='send-btn sent';btn.disabled=true;btn.innerHTML='✓ Sent';}
        toast('Birthday message sent to '+first+'! 🎉','ok');
      } else {
        if(btn){btn.disabled=false;btn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send';}
        toast('Could not send: '+(r&&r.error?r.error:'Error'),'err');
      }
    })
    .withFailureHandler(function(e){
      if(btn){btn.disabled=false;btn.innerHTML='Retry';}
      toast('Send failed','err');
    })
    .gasCall(getBKToken(),'sendBirthdayMessageAPI',email,phone,subj,msg,name);
}

function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function hsh(s){var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h;}
function stamp(){var n=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});document.getElementById('upd').textContent='Updated '+n;}

var _tt;
function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type||'');
  clearTimeout(_tt); _tt=setTimeout(function(){el.classList.remove('show');},3000);
}
function showErr(msg){var el=document.getElementById('err');el.textContent=msg;el.style.display=msg?'block':'none';}

function goHome(){
  // Navigate back to the GitHub PWA
  window.location.href='https://kevinwallace553-oss.github.io/Bolt/';
}
function doSignOut(){
  SESSION.token=''; SESSION.orgId='';
  try{window.sessionStorage.removeItem('bk_token');}catch(e){}
  google.script.run.withSuccessHandler(function(){
    window.location.href='https://kevinwallace553-oss.github.io/Bolt/';
  }).authLogoutAPI('');
  window.location.href='https://kevinwallace553-oss.github.io/Bolt/';
}

// Auto-refresh every 30s
setInterval(function(){ if(getBKToken()) loadData(); }, 30000);

// Init
window.addEventListener('load', function(){
  if(!getBKToken()){
    showErr('No session found — please sign in again.');
    setTimeout(function(){
      window.location.href='https://kevinwallace553-oss.github.io/Bolt/';
    }, 2000);
    return;
  }
  loadData();
});
</script>
