<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolt Kiosk — Parent Page</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #111f35;
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg,#10b981,#06b6d4);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-size: 13px; font-weight: 900; letter-spacing: 2px;
      color: #fff;
    }
    .logo-sub {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      color: #10b981; text-transform: uppercase;
    }

    .section-lbl {
      font-size: 9px; font-weight: 800; letter-spacing: 2.5px;
      text-transform: uppercase; color: rgba(255,255,255,.4);
      margin-bottom: 8px;
    }

    .child-name {
      font-size: 36px; font-weight: 900; color: #fff;
      line-height: 1.1; margin-bottom: 4px;
    }
    .child-details {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .badge {
      font-size: 11px; font-weight: 700; padding: 3px 12px;
      border-radius: 100px;
    }
    .badge-room  { background: rgba(16,185,129,0.15); border: 1.5px solid rgba(16,185,129,0.4); color: #6ee7b7; }
    .badge-grade { background: rgba(59,130,246,0.15); border: 1.5px solid rgba(59,130,246,0.4); color: #93c5fd; }

    .divider {
      height: 1px;
      background: repeating-linear-gradient(90deg,rgba(255,255,255,.1) 0,rgba(255,255,255,.1) 6px,transparent 6px,transparent 12px);
      margin: 18px 0;
    }

    .parent-box {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .parent-name  { font-size: 17px; font-weight: 700; color: #6ee7b7; margin-bottom: 4px; }
    .parent-phone {
      font-size: 22px; font-weight: 800; color: #fff;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .call-btn {
      display: block; width: 100%;
      padding: 13px;
      background: linear-gradient(135deg,#10b981,#059669);
      border: none; border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 800;
      cursor: pointer; text-decoration: none; text-align: center;
      letter-spacing: 0.5px;
      transition: opacity .2s;
    }
    .call-btn:hover { opacity: .9; }

    .code-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(6,78,59,0.4);
      border: 1.5px solid rgba(16,185,129,0.3);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }
    .code-lbl { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.5); }
    .code-val  { font-size: 32px; font-weight: 900; color: #6ee7b7; letter-spacing: 7px; }

    .timestamp {
      font-size: 10px; color: rgba(255,255,255,.3);
      text-align: center; margin-top: 16px;
    }

    .error-state {
      text-align: center; padding: 40px 20px;
    }
    .error-icon  { font-size: 48px; margin-bottom: 14px; }
    .error-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .error-sub   { font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="logo-row">
      <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><path d="M13 2L4.5 13.5H12L11 22l8.5-11.5H13Z"/></svg></div>
      <div>
        <div class="logo-text">BOLT KIOSK</div>
        <div class="logo-sub">Children's Ministry</div>
      </div>
    </div>
    <div id="content">
      <div class="error-state">
        <div class="error-icon"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <div class="error-title">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Parse the ?d= query param
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('d');

      if (!raw) {
        showError('No data found', 'This QR code appears to be invalid or expired.');
        return;
      }

      let data;
      try {
        data = JSON.parse(decodeURIComponent(raw));
      } catch(e) {
        showError('Invalid QR code', 'Could not read the check-in data from this tag.');
        return;
      }

      const { child, room, grade, parent, phone, code, date, time } = data;

      const roomBadge  = room  ? `<span class="badge badge-room">${room}</span>` : '';
      const gradeBadge = grade ? `<span class="badge badge-grade">Grade ${grade}</span>` : '';

      document.getElementById('content').innerHTML = `
        <div class="section-lbl">Child</div>
        <div class="child-name">${child || '—'}</div>
        <div class="child-details">${roomBadge}${gradeBadge}</div>

        <div class="divider"></div>

        <div class="section-lbl">Parent / Guardian</div>
        <div class="parent-box">
          <div class="parent-name"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${parent || '—'}</div>
          <div class="parent-phone">${phone || '—'}</div>
          <a class="call-btn" href="tel:${(phone||'').replace(/\D/g,'')}"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Call Parent Now</a>
        </div>

        <div class="section-lbl">Pickup Code</div>
        <div class="code-row">
          <div>
            <div class="code-lbl">Security Code</div>
            <div class="code-val">${code || '—'}</div>
          </div>
          <div style="font-size:28px"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        </div>

        <div class="timestamp">Checked in ${date || ''} at ${time || ''}</div>
      `;
    })();

    function showError(title, sub) {
      document.getElementById('content').innerHTML = `
        <div class="error-state">
          <div class="error-icon"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;display:inline-block;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="2.5"/></svg></div>
          <div class="error-title">${title}</div>
          <div class="error-sub">${sub}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
